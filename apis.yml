aid: data-format
name: Data Format
description: >-
  Data Format covers the syntactic conventions used to represent, exchange,
  and persist information. The landscape spans text formats (JSON, XML,
  YAML, CSV, TOML), binary formats (Protocol Buffers, Avro, Parquet, ORC,
  MessagePack, BSON, CBOR, Arrow), and schema languages and IDLs that
  govern how those formats are validated and evolved.
type: Topic
xType: topic
position: Consumer
